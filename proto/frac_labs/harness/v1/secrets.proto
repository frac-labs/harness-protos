syntax = "proto3";

package frac_labs.harness.v1;

option go_package = "github.com/frac-labs/harness-protos/gen/go/frac_labs/harness/v1;harnessv1";

import "google/protobuf/timestamp.proto";

message MintGitHubTokenRequest {
  string harness_id = 1;              // mTLS-attested; server cross-checks against client cert SAN
  string app_name = 2;                // "frac-labs-writer" | "ctrahey-agentic-reader"
  repeated string repositories = 3;   // optional scope-down; empty = app default
}

message MintGitHubTokenResponse {
  string token = 1;
  google.protobuf.Timestamp expires_at = 2;
}

message GetSecretRequest {
  string harness_id = 1;
  string key = 2;                     // hierarchical, e.g. "argocd/repo-creds/clawdiovascular"
}

message GetSecretResponse {
  bytes value = 1;
  google.protobuf.Timestamp fetched_at = 2;
}

service Secrets {
  rpc MintGitHubToken(MintGitHubTokenRequest) returns (MintGitHubTokenResponse);
  rpc GetSecret(GetSecretRequest) returns (GetSecretResponse);
}
