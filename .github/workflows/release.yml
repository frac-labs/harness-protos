name: release
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

jobs:
  generate-and-publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: bufbuild/buf-setup-action@v1

      - name: buf generate
        run: buf generate

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: go mod tidy (fills transitive deps for gen/go gRPC code)
        run: go mod tidy

      - name: Publish Go module release branch
        env:
          GIT_AUTHOR_NAME: frac-labs-writer[bot]
          GIT_AUTHOR_EMAIL: frac-labs-writer[bot]@users.noreply.github.com
          GIT_COMMITTER_NAME: frac-labs-writer[bot]
          GIT_COMMITTER_EMAIL: frac-labs-writer[bot]@users.noreply.github.com
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          BRANCH="release/go/${TAG}"
          git checkout -B "${BRANCH}"
          # Force-add the generated Go files (and updated go.mod/go.sum from
          # `go mod tidy` above) even if .gitignore would exclude them.
          git add -f gen/go go.mod go.sum || true
          git commit -m "release(go): ${TAG}" || echo "nothing to commit"
          git push -f origin "${BRANCH}"

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://npm.pkg.github.com'
          scope: '@frac-labs'

      - name: Prepare TS package
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME#v}"
          mkdir -p gen/ts
          cat > gen/ts/package.json <<EOF
          {
            "name": "@frac-labs/harness-protos",
            "version": "${TAG}",
            "type": "module",
            "publishConfig": { "registry": "https://npm.pkg.github.com" }
          }
          EOF

      - name: npm publish
        working-directory: gen/ts
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm publish || echo "publish skipped (already exists?)"

      - name: Publish Python release branch
        env:
          GIT_AUTHOR_NAME: frac-labs-writer[bot]
          GIT_AUTHOR_EMAIL: frac-labs-writer[bot]@users.noreply.github.com
          GIT_COMMITTER_NAME: frac-labs-writer[bot]
          GIT_COMMITTER_EMAIL: frac-labs-writer[bot]@users.noreply.github.com
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          BRANCH="release/python/${TAG}"

          # Reset to the original tag commit so we don't carry Go release-branch state.
          # gen/python was already generated by the earlier `buf generate` step, but
          # `git checkout -B ... <sha>` would discard the untracked tree, so regenerate.
          git checkout -B "${BRANCH}" "${GITHUB_SHA}"
          buf generate

          # buf.build/grpc/python emits modules at gen/python/frac_labs/harness/v1/*.py.
          # The *_pb2_grpc.py files import their sibling *_pb2.py via the full
          # package path (`from frac_labs.harness.v1 import secrets_pb2 ...`), so we
          # ship the package as `frac_labs` directly — no rename needed. Drop in
          # __init__.py files so setuptools.find treats them as packages.
          touch gen/python/frac_labs/__init__.py \
                gen/python/frac_labs/harness/__init__.py \
                gen/python/frac_labs/harness/v1/__init__.py

          cat > gen/python/pyproject.toml <<EOF
          [project]
          name = "harness-protos"
          version = "${VERSION}"
          requires-python = ">=3.10"
          dependencies = ["grpcio>=1.60", "protobuf>=4.25"]

          [build-system]
          requires = ["setuptools>=68"]
          build-backend = "setuptools.build_meta"

          [tool.setuptools.packages.find]
          where = ["."]
          include = ["frac_labs*"]
          EOF

          git add -f gen/python
          git commit -m "release(python): ${TAG}" || echo "nothing to commit"
          git push -f origin "${BRANCH}"
