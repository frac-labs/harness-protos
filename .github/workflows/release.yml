name: release
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

jobs:
  generate-and-publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: bufbuild/buf-setup-action@v1

      - name: buf generate
        run: buf generate

      - name: Publish Go module release branch + retag
        env:
          GIT_AUTHOR_NAME: frac-labs-writer[bot]
          GIT_AUTHOR_EMAIL: frac-labs-writer[bot]@users.noreply.github.com
          GIT_COMMITTER_NAME: frac-labs-writer[bot]
          GIT_COMMITTER_EMAIL: frac-labs-writer[bot]@users.noreply.github.com
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          BRANCH="release/go/${TAG}"
          git checkout -B "${BRANCH}"
          # Force-add generated Go (gen/ is gitignored on main but must ship on release branch).
          git add -f gen/go go.mod || true
          git commit -m "release(go): ${TAG}" || echo "nothing to commit"
          git push -f origin "${BRANCH}"
          # Re-point the tag at the release-branch HEAD so `go get MOD@TAG`
          # resolves to a tree that actually contains gen/go + go.mod.
          NEW_SHA="$(git rev-parse HEAD)"
          git tag -f "${TAG}" "${NEW_SHA}"
          git push -f origin "refs/tags/${TAG}"

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://npm.pkg.github.com'
          scope: '@frac-labs'

      - name: Prepare TS package
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME#v}"
          mkdir -p gen/ts
          cat > gen/ts/package.json <<EOF
          {
            "name": "@frac-labs/harness-protos",
            "version": "${TAG}",
            "type": "module",
            "publishConfig": { "registry": "https://npm.pkg.github.com" },
            "repository": { "type": "git", "url": "https://github.com/frac-labs/harness-protos.git" }
          }
          EOF

      - name: npm publish
        working-directory: gen/ts
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm publish || echo "publish skipped (already exists?)"
